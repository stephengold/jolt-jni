---
# GitHub Actions workflow for commits pushed to the jolt-jni repo - all branches

name: CI at GitHub
on: [push, workflow_dispatch]

jobs:
  Java21-MacOSX64:
    if: contains(toJson(github.event.commits), '[ci skip] ') == false
    runs-on: macos-26-intel
    steps:
      - uses: actions/setup-java@v5
        with:
          distribution: 'zulu'
          java-version: 21
      - uses: actions/checkout@v6
      - uses: gradle/actions/setup-gradle@v6
      - uses: humbletim/setup-vulkan-sdk@v1.2.1
        with:
          vulkan-components: Vulkan-Headers, Vulkan-Loader
          vulkan-query-version: 1.4.341.1
          vulkan-use-cache: true
      - name: gradlew -Pbt=Debug -Pflavor=Sp -Ptarget=MacOSX64 -PuseVK=yes -x checkstyleMain -x checkstyleTest run runSmokeTestAll build install
        if: "!startsWith(github.ref, 'refs/tags/')"
        run: |
          ./gradlew -Pbt=Debug -Pflavor=Sp -Ptarget=MacOSX64 -PuseVK=yes -x checkstyleMain -x checkstyleTest run runSmokeTestAll build install \
            --console=plain
      - name: gradlew -Partifact=jolt-jni-MacOSX64 -Ptarget=MacOSX64 -PuseVK=yes clean release
        if: startsWith(github.ref, 'refs/tags/')
        run: |
          ./gradlew -Partifact=jolt-jni-MacOSX64 -Ptarget=MacOSX64 -PuseVK=yes clean release \
            --console=plain \
            -PsigningKeyEncoded='${{ secrets.SIGNING_KEY_ENCODED }}' \
            -PsigningPassword='${{ secrets.SIGNING_PASSWORD }}' \
            -PcentralPassword='${{ secrets.CENTRAL_PASSWORD }}' \
            -PcentralUsername='${{ secrets.CENTRAL_USERNAME }}'
      - name: uploadToCentral.sh
        if: startsWith(github.ref, 'refs/tags/')
        run: |
          bash/uploadToCentral.sh -p '${{ secrets.CENTRAL_PASSWORD }}' \
            -u '${{ secrets.CENTRAL_USERNAME }}'

  Java21-MacOSX_ARM64:
    if: contains(toJson(github.event.commits), '[ci skip] ') == false
    runs-on: macos-26
    steps:
      - uses: actions/setup-java@v5
        with:
          distribution: 'zulu'
          java-version: 21
      - uses: actions/checkout@v6
      - uses: gradle/actions/setup-gradle@v6
      - uses: humbletim/setup-vulkan-sdk@v1.2.1
        with:
          vulkan-components: Vulkan-Headers, Vulkan-Loader
          vulkan-query-version: 1.4.341.1
          vulkan-use-cache: true
      - name: gradlew -Pbt=Debug -Pflavor=Dp -Ptarget=MacOSX_ARM64 -PuseVK=yes -x checkstyleMain -x checkstyleTest runSmokeTestAll build install
        if: "!startsWith(github.ref, 'refs/tags/')"
        run: |
          ./gradlew -Pbt=Debug -Pflavor=Dp -Ptarget=MacOSX_ARM64 -PuseVK=yes -x checkstyleMain -x checkstyleTest runSmokeTestAll build install \
            --console=plain
